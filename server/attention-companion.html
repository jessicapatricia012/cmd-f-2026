<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AFK Attention Companion</title>
    <style>
      body { margin: 0; background: #020617; color: #e2e8f0; font: 14px system-ui, sans-serif; }
      .wrap { display: grid; gap: 10px; padding: 12px; max-width: 860px; margin: 0 auto; }
      .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
      .pill { padding: 6px 10px; border-radius: 999px; border: 1px solid #334155; background: #0f172a; }
      .ok { color: #86efac; border-color: #14532d; }
      .warn { color: #fdba74; border-color: #78350f; }
      .err { color: #fecaca; border-color: #7f1d1d; }
      .stage { position: relative; width: min(100%, 840px); aspect-ratio: 16 / 10; background: #020617; border: 1px solid #334155; border-radius: 10px; overflow: hidden; }
      video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
      #gaze-dot { position: absolute; width: 14px; height: 14px; border-radius: 50%; background: #22d3ee; border: 2px solid #0e7490; transform: translate(-50%, -50%); pointer-events: none; display: none; }
      button { padding: 8px 12px; border: 1px solid #334155; border-radius: 8px; background: #111827; color: #e2e8f0; cursor: pointer; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
  </head>
  <body>
    <div class="wrap">
      <div class="row">
        <button id="start-btn">Start Companion Camera</button>
        <span id="status" class="pill">idle</span>
        <span id="state" class="pill">attention: unknown</span>
      </div>
      <div class="stage">
        <video id="video" autoplay playsinline muted></video>
        <div id="gaze-dot"></div>
      </div>
      <div class="pill">Keep this tab open while watching videos in another tab.</div>
    </div>

    <script>
      const video = document.getElementById("video");
      const startBtn = document.getElementById("start-btn");
      const statusEl = document.getElementById("status");
      const stateEl = document.getElementById("state");
      const dot = document.getElementById("gaze-dot");

      let mesh = null;
      let running = false;
      let pending = false;
      let lastCandidate = "unknown";
      let lastCandidateAt = 0;
      let stableState = "unknown";

      const CFG = {
        awayStableMs: 900,
        lookStableMs: 450,
        centerXMin: 0.34,
        centerXMax: 0.66,
        yawRatioMax: 0.48,
      };

      function setStatus(text, cls = "") {
        statusEl.textContent = text;
        statusEl.className = `pill ${cls}`.trim();
      }

      function postAttention(event, detail = {}) {
        window.postMessage({
          type: "AFK_EXTERNAL_ATTENTION",
          event,
          detail,
        }, "*");
      }

      function commitCandidate(candidate, now) {
        if (candidate !== lastCandidate) {
          lastCandidate = candidate;
          lastCandidateAt = now;
          return;
        }
        if (stableState === candidate) return;
        const ms = now - lastCandidateAt;
        const needed = candidate === "away" ? CFG.awayStableMs : CFG.lookStableMs;
        if (ms < needed) return;
        stableState = candidate;
        stateEl.textContent = `attention: ${candidate}`;
        postAttention(candidate === "away" ? "attention:look-away" : "attention:look-at", { stableForMs: ms, from: "companion" });
      }

      function classifyFromLandmarks(lm) {
        const leftEyeOuter = lm[33];
        const rightEyeOuter = lm[263];
        const noseTip = lm[1];
        if (!leftEyeOuter || !rightEyeOuter || !noseTip) return { looking: false, x: 0.5, y: 0.5 };
        const eyeMidX = (leftEyeOuter.x + rightEyeOuter.x) / 2;
        const eyeSpan = Math.abs(rightEyeOuter.x - leftEyeOuter.x);
        const centered = eyeMidX >= CFG.centerXMin && eyeMidX <= CFG.centerXMax;
        const yawRatio = eyeSpan > 0.0001 ? Math.abs((noseTip.x - eyeMidX) / (eyeSpan / 2)) : 0;
        return { looking: centered && yawRatio <= CFG.yawRatioMax, x: noseTip.x, y: noseTip.y };
      }

      async function loop() {
        if (!running || pending || !mesh) {
          requestAnimationFrame(loop);
          return;
        }
        pending = true;
        try {
          await mesh.send({ image: video });
        } catch (err) {
          setStatus(`mesh error: ${err?.message || err}`, "err");
          postAttention("attention:status", { state: "unsupported", reason: String(err?.message || err), from: "companion" });
          running = false;
        } finally {
          pending = false;
          requestAnimationFrame(loop);
        }
      }

      async function start() {
        if (running) return;
        setStatus("requesting camera...");
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false });
        video.srcObject = stream;
        await video.play();

        mesh = new FaceMesh({
          locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`,
        });
        mesh.setOptions({
          maxNumFaces: 1,
          refineLandmarks: true,
          minDetectionConfidence: 0.5,
          minTrackingConfidence: 0.5,
        });
        mesh.onResults((results) => {
          const now = Date.now();
          const lm = results?.multiFaceLandmarks?.[0];
          if (!lm) {
            dot.style.display = "none";
            postAttention("attention:status", { state: "no-face", from: "companion" });
            commitCandidate("away", now);
            return;
          }

          const { looking, x, y } = classifyFromLandmarks(lm);
          dot.style.display = "block";
          dot.style.left = `${(1 - x) * 100}%`;
          dot.style.top = `${y * 100}%`;
          postAttention("attention:status", { state: "face-detected", from: "companion" });
          postAttention("attention:gaze", { normX: 1 - x, normY: y, engine: "companion-face-mesh" });
          commitCandidate(looking ? "looking" : "away", now);
        });

        running = true;
        setStatus("running", "ok");
        postAttention("attention:status", { state: "ready", engine: "companion-face-mesh", from: "companion" });
        requestAnimationFrame(loop);
      }

      startBtn.addEventListener("click", () => {
        start().catch((err) => setStatus(`start failed: ${err?.message || err}`, "err"));
      });
    </script>
  </body>
</html>
